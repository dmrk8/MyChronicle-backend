name: Build, Push & Deploy to Google Cloud

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  PROJECT_NUMBER: ${{ secrets.GCP_PROJECT_NUMBER }}
  REGION: ${{ secrets.GCP_REGION }}
  REPO: mychronicle
  SERVICE: mychronicle-backend
  IMAGE: mychronicle-backend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      - run: pip install -r dev-requirements.txt 
      - run: pytest tests/ -v
  
  
  deploy:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/141100622138/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@project-fcdce7ca-68d2-4dd8-bb9.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build -t \
            us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }} .

      - name: Push to Artifact Registry
        run: |
          docker push \
            us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --min-instances=0 \
            --max-instances=2 \
            --memory=512Mi \
            --cpu=1 \
            --set-env-vars="\
          ENV=${{ vars.ENV }},\
          LOG_LEVEL=${{ vars.LOG_LEVEL }},\
          SERVICE_NAME=${{ vars.SERVICE_NAME }},\
          MONGODB_URI=${{ secrets.MONGODB_URI }},\
          DATABASE_NAME=${{ vars.DATABASE_NAME }},\
          REVIEW_COLLECTION=${{ vars.REVIEW_COLLECTION }},\
          USER_COLLECTION=${{ vars.USER_COLLECTION }},\
          USER_MEDIA_ENTRY_COLLECTION=${{ vars.USER_MEDIA_ENTRY_COLLECTION }},\
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }},\
          JWT_ALGORITHM=${{ vars.JWT_ALGORITHM }},\
          JWT_ACCESS_TOKEN_EXPIRE_DAYS=${{ vars.JWT_ACCESS_TOKEN_EXPIRE_DAYS }},\
          JWT_ISSUER=${{ vars.JWT_ISSUER }},\
          JWT_AUDIENCE=${{ vars.JWT_AUDIENCE }},\
          TMDB_API_KEY=${{ secrets.TMDB_API_KEY }},\
          TMDB_ACCESS_TOKEN=${{ secrets.TMDB_ACCESS_TOKEN }},\
          SAMESITE=${{ vars.SAMESITE }},\
          ALLOW_ORIGINS_STR=${{ vars.ALLOW_ORIGINS_STR }}"
            
      - name: Clean up old images
        run: |
          gcloud artifacts docker images list \
            us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }} \
            --format="value(digest)" \
            --sort-by="~createTime" 2>/dev/null | tail -n +4 | while read DIGEST; do
              if [ -n "$DIGEST" ]; then
                echo "Deleting $DIGEST ..."
                gcloud artifacts docker images delete \
                  "us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}@${DIGEST}" \
                  --delete-tags --quiet || true
              fi
            done
