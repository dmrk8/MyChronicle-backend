name: Build, Push & Deploy to Google Cloud

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  PROJECT_NUMBER: ${{ secrets.GCP_PROJECT_NUMBER }}
  REGION: ${{ secrets.GCP_REGION }}
  REPO: mychronicle
  SERVICE: mychronicle-backend
  IMAGE: mychronicle-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/141100622138/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@project-fcdce7ca-68d2-4dd8-bb9.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build -t \
            us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }} .

      - name: Push to Artifact Registry
        run: |
          docker push \
            us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        env:
          ENV: ${{ secrets.ENV }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          SERVICE_NAME: ${{ secrets.SERVICE_NAME }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          REVIEW_COLLECTION: ${{ secrets.REVIEW_COLLECTION }}
          USER_COLLECTION: ${{ secrets.USER_COLLECTION }}
          USER_MEDIA_ENTRY_COLLECTION: ${{ secrets.USER_MEDIA_ENTRY_COLLECTION }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          JWT_ALGORITHM: ${{ secrets.JWT_ALGORITHM }}
          JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.JWT_ACCESS_TOKEN_EXPIRE_MINUTES }}
          JWT_REFRESH_TOKEN_EXPIRE_DAYS_DEFAULT: ${{ secrets.JWT_REFRESH_TOKEN_EXPIRE_DAYS_DEFAULT }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TMDB_ACCESS_TOKEN: ${{ secrets.TMDB_ACCESS_TOKEN }}
          SAMESITE: ${{ secrets.SAMESITE }}
          ALLOW_ORIGINS_STR: ${{ secrets.ALLOW_ORIGINS_STR }}
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --min-instances=0 \
            --max-instances=2 \
            --memory=512Mi \
            --cpu=1 \
            --set-env-vars="^||^ENV=${ENV}||LOG_LEVEL=${LOG_LEVEL}||SERVICE_NAME=${SERVICE_NAME}||MONGODB_URI=${MONGODB_URI}||DATABASE_NAME=${DATABASE_NAME}||REVIEW_COLLECTION=${REVIEW_COLLECTION}||USER_COLLECTION=${USER_COLLECTION}||USER_MEDIA_ENTRY_COLLECTION=${USER_MEDIA_ENTRY_COLLECTION}||JWT_SECRET_KEY=${JWT_SECRET_KEY}||JWT_ALGORITHM=${JWT_ALGORITHM}||JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}||JWT_REFRESH_TOKEN_EXPIRE_DAYS_DEFAULT=${JWT_REFRESH_TOKEN_EXPIRE_DAYS_DEFAULT}||JWT_ISSUER=${JWT_ISSUER}||JWT_AUDIENCE=${JWT_AUDIENCE}||TMDB_API_KEY=${TMDB_API_KEY}||TMDB_ACCESS_TOKEN=${TMDB_ACCESS_TOKEN}||SAMESITE=${SAMESITE}||ALLOW_ORIGINS_STR=${ALLOW_ORIGINS_STR}"
            
      - name: Clean up old images
        run: |
          gcloud artifacts docker images list \
            us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }} \
            --format="get(version)" \
            --sort-by="~createTime" | tail -n +4 | xargs -I {} \
            gcloud artifacts docker images delete \
            "us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}@{}" \
            --quiet --async || true
